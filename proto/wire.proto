syntax = "proto3";

package model_shard.wire;

// ---------------------------------------------------------------------------
// Phase 1 wire protocol.
//
// Design rules:
//   * All messages carry a protocol_version. Bump on breaking changes.
//   * Large tensors travel OUT OF BAND: the protobuf message carries a
//     TensorDescriptor (shape/dtype/quant), and the raw bytes follow the
//     framed protobuf on the same TCP stream. The framing is defined in
//     src/model_shard/transport.py, not here.
//   * Fields are additive. New phases add fields; they do not reuse tag
//     numbers.
// ---------------------------------------------------------------------------

enum DType {
  DTYPE_UNSPECIFIED = 0;
  DTYPE_FLOAT32 = 1;
  DTYPE_FLOAT16 = 2;
  DTYPE_BFLOAT16 = 3;
  DTYPE_INT32 = 4;
  DTYPE_INT8 = 5;
  DTYPE_UINT8 = 6;
  DTYPE_UINT32 = 7;  // NEW: packed quantized 4-bit weights (uint32 raw)
}

enum QuantScheme {
  QUANT_NONE = 0;
  QUANT_Q4_0 = 1;  // 4-bit, grouped (MLX default for gemma-4-26b-a4b-it-4bit)
  QUANT_Q8_0 = 2;
}

message TensorDescriptor {
  repeated int64 shape = 1;
  DType dtype = 2;
  QuantScheme quant = 3;
  // Byte count of the accompanying out-of-band tensor payload.
  // Receiver uses this to know exactly how many bytes to read after the
  // protobuf frame.
  uint64 byte_count = 4;
}

message SamplingParams {
  // Phase 1: greedy only. Future phases add temperature/top_p/top_k.
  bool greedy = 1;
}

// ---------------------------------------------------------------------------
// Control messages.
// A wire frame is: [uint32 BE msg_len] [msg bytes] [uint32 BE tensor_len]
//                   [tensor bytes].  tensor_len may be 0.
// ---------------------------------------------------------------------------

message BeginRequest {
  uint32 protocol_version = 1;
  string request_id = 2;    // unique per inference job (UUID string)
  string sequence_id = 3;   // groups multi-token generation
  repeated uint32 prompt_token_ids = 4;
  SamplingParams sampling = 5;
  // First layer this shard should execute. Usually 0 for the head node.
  uint32 start_layer = 6;
  // How many tokens to generate before terminating the request. The head
  // node tracks generation count and stops the decode loop when reached.
  uint32 max_new_tokens = 7;
}

message ContinueRequest {
  uint32 protocol_version = 1;
  string request_id = 2;
  uint32 token_id = 3;      // the token just sampled
  uint32 position = 4;      // its position in the sequence
}

message Activation {
  uint32 protocol_version = 1;
  string request_id = 2;
  uint32 next_layer_idx = 3;   // the layer the RECEIVING node should run next
  TensorDescriptor tensor = 4; // describes the accompanying tensor bytes
  repeated ProvenanceEntryPb provenance = 5;  // NEW: Phase 6-B
}

message Logits {
  uint32 protocol_version = 1;
  string request_id = 2;
  TensorDescriptor tensor = 3;
}

// Emitted by the tail node after sampling a token from logits. Flows
// backward: tail -> head -> client. Logits themselves never cross the
// network — only the sampled id, which is a few bytes.
message SampledToken {
  uint32 protocol_version = 1;
  string request_id = 2;
  uint32 token_id = 3;
  uint32 position = 4;  // 0-indexed position within the generated sequence
  bool is_final = 5;    // true on the last token of the request
}

message EndRequest {
  uint32 protocol_version = 1;
  string request_id = 2;
}

enum ErrorCode {
  ERR_UNSPECIFIED = 0;
  ERR_UNKNOWN_REQUEST = 1;
  ERR_WRONG_SHARD = 2;
  ERR_PROTOCOL_VERSION = 3;
  ERR_INTERNAL = 4;
  ERR_SHARD_UNAVAILABLE = 5;  // Phase 2: a required shard is suspect/dead.
  ERR_INVALID_PROVENANCE = 6;  // NEW: Phase 6-B
}

message Error {
  uint32 protocol_version = 1;
  string request_id = 2;
  ErrorCode code = 3;
  string detail = 4;
}

// ---------------------------------------------------------------------------
// Phase 2 — SWIM membership messages.
// All membership messages travel over a separate UDP transport (not the TCP
// envelope used for activations). The framing is one protobuf-encoded
// Envelope per UDP datagram. Datagrams must fit in a single 1400-byte MTU
// budget. See src/model_shard/membership/transport.py.
// ---------------------------------------------------------------------------

message MemberRecordPb {
  string shard_id = 1;
  string host = 2;
  uint32 udp_port = 3;
  // 0 = alive, 1 = suspect, 2 = dead. Must match records.MemberState ordering.
  uint32 state = 4;
  uint64 incarnation = 5;
  // Phase 7-C-3b: cluster admission contract. Each node gossips its
  // model_id; receivers refuse peers with mismatched id. Empty string
  // means "not set" (legacy nodes).
  string model_id = 6;
}

message Ping {
  uint32 protocol_version = 1;
  string from_shard_id = 2;
  uint64 from_incarnation = 3;
  // Up to K_GOSSIP recent membership transitions piggybacked.
  repeated MemberRecordPb deltas = 4;
  repeated LoadReport loads = 5;  // NEW
  repeated ExpertHeatReport heat      = 6;  // NEW
  repeated OwnershipDelta   ownership = 7;  // NEW
}

message Ack {
  uint32 protocol_version = 1;
  string from_shard_id = 2;
  uint64 from_incarnation = 3;
  repeated MemberRecordPb deltas = 4;
  repeated LoadReport loads = 5;  // NEW
  repeated ExpertHeatReport heat      = 6;  // NEW
  repeated OwnershipDelta   ownership = 7;  // NEW
}

message PingReq {
  uint32 protocol_version = 1;
  string from_shard_id = 2;
  string target_shard_id = 3;
  // A correlation id so the requester can match the eventual PingReqAck.
  string probe_id = 4;
  repeated MemberRecordPb deltas = 5;
  repeated LoadReport loads = 6;  // NEW
  repeated ExpertHeatReport heat      = 7;  // NEW
  repeated OwnershipDelta   ownership = 8;  // NEW
}

message PingReqAck {
  uint32 protocol_version = 1;
  string from_shard_id = 2;
  string target_shard_id = 3;
  string probe_id = 4;
  bool success = 5;
  repeated MemberRecordPb deltas = 6;
  repeated LoadReport loads = 7;  // NEW
  repeated ExpertHeatReport heat      = 8;  // NEW
  repeated OwnershipDelta   ownership = 9;  // NEW
}

message Join {
  uint32 protocol_version = 1;
  MemberRecordPb self_record = 2;
}

message MembershipDelta {
  uint32 protocol_version = 1;
  // Full snapshot of the sender's view, used as one-shot bootstrap response.
  repeated MemberRecordPb members = 2;
}

// ---------------------------------------------------------------------------
// Phase 3 — expert-level sharding fan-out.
// Sent node-to-node over the TCP envelope transport. Tensor payloads travel
// out-of-band, same as Activation.
// ---------------------------------------------------------------------------

message ExpertRequest {
  uint32 protocol_version = 1;
  string request_id = 2;
  uint32 layer_idx = 3;
  repeated uint32 expert_ids = 4;  // experts to run on the receiving node
  TensorDescriptor h_spec = 5;     // describes the accompanying post-attention
                                   // hidden-state tensor [B, L, hidden]
  repeated ProvenanceEntryPb provenance = 6;  // NEW: Phase 6-B
}

message ExpertResponse {
  uint32 protocol_version = 1;
  string request_id = 2;
  uint32 layer_idx = 3;
  // Same id order as the corresponding ExpertRequest. The response tensor
  // stacks per-expert outputs on a new dim: [B, L, len(expert_ids), hidden].
  repeated uint32 expert_ids = 4;
  TensorDescriptor outputs_spec = 5;
  repeated ProvenanceEntryPb provenance = 6;  // NEW: Phase 6-B
}

// ---------------------------------------------------------------------------
// Envelope. Nodes dispatch on which 'oneof' is set.
// ---------------------------------------------------------------------------

// Phase 4 — load gossip on the hot plane (piggybacked on SWIM messages).
message LoadReport {
  string shard_id       = 1;
  uint32 queue_depth_ema = 2;  // EMA × 100 (so 250 = 2.5 average)
  int64  ts_unix_ms     = 3;
}

// ---------------------------------------------------------------------------
// Phase 5b — expert heat, ownership, and weight-transfer messages.
// ---------------------------------------------------------------------------

message ExpertHeatEntry {
  uint32 layer_idx     = 1;
  uint32 expert_id     = 2;
  uint32 heat_ema_x100 = 3;
}

message ExpertHeatReport {
  string shard_id = 1;
  repeated ExpertHeatEntry entries = 2;
  int64  ts_unix_ms = 3;
}

message OwnershipDelta {
  string shard_id   = 1;
  uint32 layer_idx  = 2;
  uint32 expert_id  = 3;
  uint32 action     = 4;  // 0 = ADD; 1 = REMOVE (reserved for Phase 6)
  int64  ts_unix_ms = 5;
}

message ExpertWeightRequest {
  uint32 protocol_version = 1;
  string request_id       = 2;
  uint32 layer_idx        = 3;
  uint32 expert_id        = 4;
}

message ExpertWeightTransfer {
  uint32 protocol_version = 1;
  string request_id       = 2;
  uint32 layer_idx        = 3;
  uint32 expert_id        = 4;
  repeated TensorDescriptor tensors = 5;  // exactly 9, fixed order (see spec §3.4)
  uint32 tensor_count     = 6;
}

// ---------------------------------------------------------------------------
// Phase 6-B — provenance tracking.
// ---------------------------------------------------------------------------

enum OpType {
  OP_TYPE_UNSPECIFIED     = 0;
  OP_EMBED                = 1;
  OP_LAYER_ATOMIC         = 2;
  OP_ATTENTION_ROUTE      = 3;
  OP_EXPERT               = 4;
  OP_AGGREGATE            = 5;
  OP_FINALIZE             = 6;
  OP_SHARED_EXPERT        = 7;
}

message OpDescriptorPb {
  OpType op_type   = 1;
  uint32 layer_idx = 2;
  uint32 expert_id = 3;
}

message ProvenanceEntryPb {
  bytes hash                   = 1;
  repeated bytes parent_hashes = 2;
  string node_id               = 3;
  OpDescriptorPb op            = 4;
  double timestamp             = 5;
}

message Envelope {
  oneof payload {
    BeginRequest begin = 1;
    ContinueRequest cont = 2;
    Activation activation = 3;
    Logits logits = 4;
    EndRequest end = 5;
    Error error = 6;
    SampledToken sampled_token = 7;
    // Phase 2 SWIM membership messages.
    Ping ping = 8;
    Ack ack = 9;
    PingReq ping_req = 10;
    PingReqAck ping_req_ack = 11;
    Join join = 12;
    MembershipDelta membership_delta = 13;
    ExpertRequest expert_request = 14;
    ExpertResponse expert_response = 15;
    ExpertWeightRequest  expert_weight_request  = 16;
    ExpertWeightTransfer expert_weight_transfer = 17;
  }
}
